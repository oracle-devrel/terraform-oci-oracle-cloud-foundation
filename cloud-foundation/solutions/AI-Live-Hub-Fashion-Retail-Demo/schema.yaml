  # --------------------------------------------------------------------------
  # Object Storage
  # These variables configure the buckets used by the solution for AI files
  # and ATP wallet / credential artifacts.
  # --------------------------------------------------------------------------
  files_bucket_name:
    title: Files Bucket Name
    description: "Enter a unique name for this object storage bucket."
    type: string
    required: true
    visible: true

  files_bucket_access_type:
    title: Files Bucket Access Type
    description: "Select the Access Type of the files bucket."
    type: enum
    enum:
      - NoPublicAccess
      - ObjectReadWithoutList
      - ObjectRead
    default: "ObjectRead"
    required: true
    visible: true

  files_bucket_storage_tier:
    title: Files Bucket Storage Tier
    description: "Select the storage Tier of the files bucket."
    type: enum
    enum:
      - Standard
      - Archive
    default: "Standard"
    required: true
    visible: true

  files_bucket_events_enabled:
    title: Files bucket events enabled
    description: "Indicates if files bucket events are enabled or not."
    type: enum
    enum:
      - true
      - false
    default: false
    required: true
    visible: true

  atp_creds_bucket_name:
    title: ATP Credentials Bucket Name
    description: "Enter a unique name for the ATP credentials object storage bucket."
    type: string
    required: true
    visible: true

  atp_creds_bucket_access_type:
    title: ATP Credentials Bucket Access Type
    description: "Select the Access Type of the ATP credentials bucket."
    type: enum
    enum:
      - NoPublicAccess
      - ObjectReadWithoutList
      - ObjectRead
    default: "ObjectRead"
    required: true
    visible: true

  atp_creds_bucket_storage_tier:
    title: ATP Credentials Bucket Storage Tier
    description: "Select the storage Tier of the ATP credentials bucket."
    type: enum
    enum:
      - Standard
      - Archive
    default: "Standard"
    required: true
    visible: true

  atp_creds_bucket_events_enabled:
    title: ATP credentials bucket events enabled
    description: "Indicates if ATP credentials bucket events are enabled or not."
    type: enum
    enum:
      - true
      - false
    default: false
    required: true
    visible: true

  # --------------------------------------------------------------------------
  # Bastion VM Configuration
  # These variables define the compute instance that hosts the application.
  # --------------------------------------------------------------------------
  bastion_instance_display_name:
    title: Bastion VM Display Name
    description: "Enter a name for thhe Bastion VM. The name provided must start with a letter, contain only alphanumeric characters, no spaces and span up to 30 characters in total."
    type: string
    default: "AgenticAI"
    required: true
    visible: true

  bastion_instance_shape:
    title: Provide the shape for Bastion VM
    description: "Provide the shape for Bastion VM"
    type: oci:core:instanceshape:name
    default: "VM.Standard2.1"
    required: true
    visible: true
    dependsOn:
      compartmentId: ${compartment_id}

  # --------------------------------------------------------------------------
  # Network Configuration
  # These variables define the VCN and subnet CIDR ranges used by the solution.
  # Advanced options are shown only when explicitly enabled.
  # --------------------------------------------------------------------------
  vcn_cidr:
    visible:
      and:
        - show_advanced_options
    type: string
    default: "10.0.0.0/16"
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    title: VCN Network CIDR
    required: true
    description: The CIDR to assign to the new Virtual Cloud Network (VCN) to create for this service. This field is not required if you want to use an existing VCN. When using VCN peering ensure that the VCNs being peered have non-overlapping CIDR blocks.

  public_subnet_cidr:
    visible:
      and:
        - show_advanced_options
    type: string
    default: "10.0.0.0/24"
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    required: true
    title: Public Subnet CIDR
    description: "The CIDR of the new public subnet."

  private_subnet_cidr:
    visible:
      and:
        - show_advanced_options
    type: string
    default: "10.0.1.0/24"
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    required: true
    title: Private Subnet CIDR
    description: "The CIDR of the new private subnet."

  show_advanced_options:
    title: Show Advanced Options
    description: Enable advanced options for network.
    type: boolean
    default: false
    visible: true

  # --------------------------------------------------------------------------
  # Hidden Variables
  # These variables are internal or compatibility-only settings and are not
  # intended to be modified in the Resource Manager UI.
  # --------------------------------------------------------------------------
  atp_private_endpoint_subnet_id:
    title: atp_private_endpoint_subnet_id
    type: string
    required: false
    visible: false

  atp_private_endpoint_nsg_ids:
    title: atp_private_endpoint_nsg_ids
    type: array
    items:
      type: string
    required: false
    visible: false

  oracle_mongo_username:
    title: oracle_mongo_username
    type: string
    required: false
    visible: false

  oracle_mongo_password:
    title: oracle_mongo_password
    type: string
    required: false
    visible: false

  oracle_mongo_schema:
    title: oracle_mongo_schema
    type: string
    required: false
    visible: false

outputs:
  application_url:
    type: string
    title: Application URL
    visible: true

  generated_ssh_private_key_for_bastion:
    type: string
    title: Generated SSH Private Key for Bastion
    visible: true

outputGroups:
  - title: Application
    outputs:
      - application_url
      - generated_ssh_private_key_for_bastion